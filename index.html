<!DOCTYPE html>
<html lang="es)
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StickerPrint</title>
    <style>
        :root {
            --bg-color: #0c0d11;
            --panel-bg: #14161f;
            --accent: #00ffaa;
            --accent-hover: #00db92;
            --text: #ffffff;
            --text-muted: #7e8494;
            --border: #222533;
            --input-bg: #1a1d29;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 580px;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        header {
            text-align: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 9px;
            height: 9px;
            background-color: #ff4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #ff4444;
        }

        .status-dot.connected {
            background-color: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .editor-section {
            background: rgba(0,0,0,0.15);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input[type="text"] {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        select:focus, input[type="text"]:focus {
            border-color: var(--accent);
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: rgba(255,255,255,0.01);
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(0, 255, 170, 0.02);
        }

        .upload-zone p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        #file-input { display: none; }

        .preview-container {
            margin-bottom: 20px;
        }

        .sticker-frame {
            width: 100%;
            background: #ffffff;
            border-radius: 6px;
            overflow: hidden;
            padding: 5px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.15);
            border: 1px solid #ffffff;
        }

        #canvas-preview {
            width: 100%;
            height: auto;
            display: block;
            image-rendering: pixelated;
        }

        .btn {
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--text-muted);
        }

        #log-area {
            margin-top: 15px;
            background: #050608;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #00ff88;
            max-height: 80px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Sticker<span>Print</span></h1>
        <p>Entorno modular de impresión para etiquetas térmicas</p>
    </header>

    <div class="status-bar">
        <div>
            <span id="status-indicator" class="status-dot"></span>
            <span id="status-text">Buscando impresora...</span>
        </div>
        <div style="color: var(--text-muted); font-size: 0.75rem;">Engine: ESC-POS Direct</div>
    </div>

    <div class="grid-2">
        <div class="control-group">
            <label>Dimensiones Etiqueta</label>
            <select id="select-size">
                <option value="50x15" selected>50mm x 15mm</option>
                <option value="50x10">50mm x 10mm</option>
            </select>
        </div>
        <div class="control-group">
            <label>Copias de Impresión</label>
            <select id="select-copies"></select>
        </div>
    </div>

    <div class="editor-section">
        <div class="section-title">Diseñador de Contenido Inteligente</div>
        
        <div class="control-group">
            <label>Texto a incrustar en la Etiqueta</label>
            <input type="text" id="text-input" placeholder="Ej: PRODUCTO A1 // ESTANTE 4">
        </div>

        <div class="grid-2">
            <div class="control-group">
                <label>Marco / Plantilla</label>
                <select id="select-template">
                    <option value="none">Sin marco (Blanco Puro)</option>
                    <option value="industrial">Estilo Industrial</option>
                    <option value="elegant">Borde Doble Fino</option>
                    <option value="badge">Cabecera Sólida</option>
                </select>
            </div>
            <div class="control-group">
                <label>Tamaño de Fuente</label>
                <select id="text-size">
                    <option value="20">Pequeña</option>
                    <option value="28" selected>Mediana</option>
                    <option value="36">Grande</option>
                    <option value="44">Extra Grande</option>
                </select>
            </div>
        </div>
    </div>

    <div class="upload-zone" id="drop-zone">
        <p>¿Quieres añadir un Logotipo/Imagen? <strong>Haz clic o arrástralo</strong></p>
        <input type="file" id="file-input" accept="image/png, image/jpeg">
    </div>

    <div class="preview-container">
        <label>Pre-visualización de Datos Rasterizados</label>
        <div class="sticker-frame">
            <canvas id="canvas-preview"></canvas>
        </div>
    </div>

    <div class="grid-2" style="margin-top: 15px;">
        <button class="btn btn-secondary" id="btn-connect">Conectar BLE</button>
        <button class="btn" id="btn-print" disabled>Imprimir</button>
    </div>

    <div id="log-area">Consola del sistema: Núcleo listo.</div>
</div>

<script>
    const selectCopies = document.getElementById('select-copies');
    for (let i = 1; i <= 20; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = `${i} ${i === 1 ? 'copia' : 'copias'}`;
        selectCopies.appendChild(opt);
    }

    const selectSize = document.getElementById('select-size');
    const selectTemplate = document.getElementById('select-template');
    const textInput = document.getElementById('text-input');
    const textSizeSelect = document.getElementById('text-size');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('canvas-preview');
    const ctx = canvas.getContext('2d');
    const btnConnect = document.getElementById('btn-connect');
    const btnPrint = document.getElementById('btn-print');
    const statusIndicator = document.getElementById('status-indicator');
    const statusText = document.getElementById('status-text');
    const logArea = document.getElementById('log-area');

    let deviceBLE = null;
    let characteristicBLE = null;
    let currentImg = null;

    function logger(msg) {
        logArea.innerHTML += `<br>> ${msg}`;
        logArea.scrollTop = logArea.scrollHeight;
    }

    function updateDimensions() {
        if (selectSize.value === '50x15') {
            canvas.width = 500;
            canvas.height = 150;
        } else {
            canvas.width = 500;
            canvas.height = 100;
        }
        renderSticker();
    }

    function renderSticker() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const template = selectTemplate.value;
        ctx.strokeStyle = '#000000';
        ctx.fillStyle = '#000000';

        if (template === 'industrial') {
            ctx.lineWidth = 4;
            ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);
            ctx.fillRect(4, 4, 16, 6); ctx.fillRect(4, 4, 6, 16);
            ctx.fillRect(canvas.width - 20, 4, 16, 6); ctx.fillRect(canvas.width - 10, 4, 6, 16);
            ctx.fillRect(4, canvas.height - 10, 16, 6); ctx.fillRect(4, canvas.height - 20, 6, 16);
            ctx.fillRect(canvas.width - 20, canvas.height - 10, 16, 6); ctx.fillRect(canvas.width - 10, canvas.height - 20, 6, 16);
        } else if (template === 'elegant') {
            ctx.lineWidth = 2;
            ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
        } else if (template === 'badge') {
            ctx.fillRect(0, 0, canvas.width, 32);
        }

        let imageRendered = false;
        let imageWidthOffset = 0;

        if (currentImg) {
            let maxH = canvas.height - 24;
            if(template === 'badge') maxH -= 20;
            let scale = Math.min((canvas.width / 2) / currentImg.width, maxH / currentImg.height);
            
            let w = currentImg.width * scale;
            let h = currentImg.height * scale;
            let x = textInput.value ? 20 : (canvas.width / 2) - (w / 2);
            let y = (canvas.height / 2) - (h / 2);
            if(template === 'badge') y += 10;

            ctx.drawImage(currentImg, x, y, w, h);
            imageRendered = true;
            imageWidthOffset = x + w + 15;
        }

        const textValue = textInput.value;
        if (textValue) {
            const fontSize = textSizeSelect.value;
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.textBaseline = 'middle';

            if (imageRendered) {
                ctx.fillStyle = '#000000';
                ctx.textAlign = 'left';
                ctx.fillText(textValue, imageWidthOffset, canvas.height / 2 + (template === 'badge' ? 12 : 0));
            } else {
                ctx.textAlign = 'center';
                if (template === 'badge') {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold 16px sans-serif`;
                    ctx.fillText(textValue, canvas.width / 2, 16);
                } else {
                    ctx.fillStyle = '#000000';
                    ctx.fillText(textValue, canvas.width / 2, canvas.height / 2);
                }
            }
        }

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            let brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
            let color = brightness > 128 ? 255 : 0;
            data[i] = color; data[i+1] = color; data[i+2] = color;
        }
        ctx.putImageData(imgData, 0, 0);
    }

    selectSize.addEventListener('change', updateDimensions);
    selectTemplate.addEventListener('change', renderSticker);
    textSizeSelect.addEventListener('change', renderSticker);
    textInput.addEventListener('input', renderSticker);

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
    dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = 'var(--border)'; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--border)';
        if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) processFile(e.target.files[0]);
    });

    function processFile(file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            currentImg = new Image();
            currentImg.onload = () => {
                renderSticker();
                checkReady();
            };
            currentImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function checkReady() {
        if (characteristicBLE) {
            btnPrint.disabled = false;
        }
    }

    btnConnect.addEventListener('click', async () => {
        if (!navigator.bluetooth) {
            logger('Error: Este navegador no tiene Web Bluetooth activado.');
            return;
        }
        try {
            logger('Buscando hardware compatible...');
            deviceBLE = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '0000ffe0-0000-1000-8000-00805f9b34fb',
                    '0000ff00-0000-1000-8000-00805f9b34fb'
                ]
            });

            logger(`Sincronizando con: ${deviceBLE.name}`);
            const server = await deviceBLE.gatt.connect();
            const services = await server.getPrimaryServices();

            for(let service of services) {
                let characteristics = await service.getCharacteristics();
                for(let char of characteristics) {
                    if(char.properties.write || char.properties.writeWithoutResponse) {
                        characteristicBLE = char;
                        break;
                    }
                }
                if(characteristicBLE) break;
            }

            if (!characteristicBLE) throw new Error('Canal TX de escritura no hallado.');

            statusIndicator.classList.add('connected');
            statusText.innerHTML = `Conectado a ${deviceBLE.name}`;
            btnConnect.innerHTML = 'Vinculado ✓';
            logger('Enlace de comunicación establecido con éxito.');
            checkReady();
        } catch (error) {
            logger(`Fallo: ${error.message}`);
        }
    });

    btnPrint.addEventListener('click', async () => {
        if (!characteristicBLE) return;
        const copies = parseInt(selectCopies.value);
        logger(`Procesando cola de producción: ${copies} copias.`);

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let bufferBytes = [];

        bufferBytes.push(0x1B, 0x40);

        for (let y = 0; y < canvas.height; y++) {
            for (let x = 0; x < canvas.width; x += 8) {
                let byteValue = 0;
                for (let bit = 0; bit < 8; bit++) {
                    let idx = ((y * canvas.width) + (x + bit)) * 4;
                    if (idx < imgData.length && imgData[idx] === 0) {
                        byteValue |= (1 << (7 - bit));
                    }
                }
                bufferBytes.push(byteValue);
            }
        }

        bufferBytes.push(0x1D, 0x56, 0x42, 0x00);
        const dataToSend = new Uint8Array(bufferBytes);

        try {
            btnPrint.disabled = true;
            for (let c = 1; c <= copies; c++) {
                logger(`Enviando copia ${c} de ${copies}...`);
                const chunkSize = 20;
                for (let offset = 0; offset < dataToSend.length; offset += chunkSize) {
                    const chunk = dataToSend.slice(offset, offset + chunkSize);
                    await characteristicBLE.writeValueWithoutResponse(chunk);
                    await new Promise(r => setTimeout(r, 8));
                }
            }
            logger('¡Impresión finalizada!');
        } catch (error) {
            logger(`Error de transmisión: ${error.message}`);
        } finally {
            btnPrint.disabled = false;
        }
    });

    updateDimensions();
</script>
</body>
</html>
