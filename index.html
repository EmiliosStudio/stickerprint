<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StickerPrint Pro // Multi-Size</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --panel-bg: #161820;
            --accent: #00ffa3;
            --accent-hover: #00d487;
            --text: #ffffff;
            --text-muted: #8a8f9f;
            --border: #262936;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        header {
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text);
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #ff4a4a;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #ff4a4a;
        }

        .status-dot.connected {
            background-color: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.01);
            margin-bottom: 25px;
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(0, 255, 163, 0.02);
        }

        .upload-zone p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        #file-input {
            display: none;
        }

        .preview-container {
            margin-bottom: 25px;
            display: none;
        }

        .preview-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .sticker-frame {
            width: 100%;
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            border: 1px solid #fff;
            transition: all 0.3s ease;
        }

        #canvas-preview {
            width: 100%;
            height: auto;
            display: block;
            image-rendering: pixelated;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            appearance: none;
        }

        select:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--text-muted);
        }

        #log-area {
            margin-top: 20px;
            background: #000;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #00ff00;
            max-height: 90px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>StickerPrint <span>Pro</span></h1>
        <p>Entorno de producción industrial para etiquetas térmicas</p>
    </header>

    <div class="status-bar">
        <div>
            <span id="status-indicator" class="status-dot"></span>
            <span id="status-text">Impresora desconectada</span>
        </div>
        <div style="color: var(--text-muted); font-size: 0.8rem;">Modo: RAW / BLE</div>
    </div>

    <div class="control-group">
        <label>Medidas de la Etiqueta (Física)</label>
        <select id="select-size">
            <option value="50x15" selected>50mm x 15mm (Proporción 3.3:1)</option>
            <option value="50x10">50mm x 10mm (Proporción 5:1)</option>
        </select>
    </div>

    <div class="upload-zone" id="drop-zone">
        <p>Arrastra tu pegatina aquí o <strong>haz clic para buscar</strong></p>
        <p style="font-size: 0.75rem; margin-top: 5px; color: var(--text-muted);">Formatos: PNG, JPG (Se autoajustará sin deformar)</p>
        <input type="file" id="file-input" accept="image/png, image/jpeg">
    </div>

    <div class="preview-container" id="preview-wrapper">
        <p class="preview-label">Vista previa del Bitmap Monocromo</p>
        <div class="sticker-frame">
            <canvas id="canvas-preview"></canvas>
        </div>
    </div>

    <div class="controls-grid">
        <div class="control-group">
            <label>Hardware</label>
            <button class="btn btn-secondary" id="btn-connect">Conectar BLE</button>
        </div>
        <div class="control-group">
            <label>Cantidad de Copias</label>
            <select id="select-copies"></select>
        </div>
    </div>

    <button class="btn" id="btn-print" disabled>Enviar a Impresora</button>

    <div id="log-area">Consola del sistema: Lista.</div>
</div>

<script>
    // Configurar selector de copias (1 a 20)
    const selectCopies = document.getElementById('select-copies');
    for (let i = 1; i <= 20; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = `${i} ${i === 1 ? 'copia' : 'copias'}`;
        selectCopies.appendChild(opt);
    }

    // Elementos del DOM
    const selectSize = document.getElementById('select-size');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const previewWrapper = document.getElementById('preview-wrapper');
    const canvas = document.getElementById('canvas-preview');
    const ctx = canvas.getContext('2d');
    const btnConnect = document.getElementById('btn-connect');
    const btnPrint = document.getElementById('btn-print');
    const statusIndicator = document.getElementById('status-indicator');
    const statusText = document.getElementById('status-text');
    const logArea = document.getElementById('log-area');

    // Variables de estado
    let deviceBLE = null;
    let characteristicBLE = null;
    let currentImg = null; // Guardamos la imagen en memoria

    function logger(msg) {
        logArea.innerHTML += `<br>> ${msg}`;
        logArea.scrollTop = logArea.scrollHeight;
    }

    // Cambiar tamaño del lienzo según la configuración seleccionada
    function updateCanvasDimensions() {
        const size = selectSize.value;
        if (size === '50x15') {
            canvas.width = 500;
            canvas.height = 150; // Relación 50:15
            logger('Medidas cambiadas a 50mm x 15mm');
        } else if (size === '50x10') {
            canvas.width = 500;
            canvas.height = 100; // Relación 50:10
            logger('Medidas cambiadas a 50mm x 10mm');
        }
        
        // Si ya hay una imagen cargada, la reprocesamos con las nuevas dimensiones instantáneamente
        if (currentImg) {
            renderSticker();
        }
    }

    selectSize.addEventListener('change', updateCanvasDimensions);

    // Inicializar dimensiones por defecto (50x15)
    updateCanvasDimensions();

    // Eventos de Carga de Archivos
    dropZone.addEventListener('click', () => fileInput.click());
    
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--accent)';
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = 'var(--border)';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--border)';
        if (e.dataTransfer.files.length > 0) {
            processFile(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            processFile(e.target.files[0]);
        }
    });

    function processFile(file) {
        if (!file.type.match('image.*')) {
            logger('Error: Debe ser un archivo de imagen JPG o PNG.');
            return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
            currentImg = new Image();
            currentImg.onload = () => {
                renderSticker();
                previewWrapper.style.display = 'block';
                checkReadyToPrint();
            };
            currentImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    // Dibuja la imagen en el canvas y aplica algoritmo binarizado monocromo
    function renderSticker() {
        if (!currentImg) return;

        // Fondo blanco limpio
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Ajustar imagen usando la técnica "contain" para evitar deformidades
        let scale = Math.min(canvas.width / currentImg.width, canvas.height / currentImg.height);
        let x = (canvas.width / 2) - (currentImg.width / 2) * scale;
        let y = (canvas.height / 2) - (currentImg.height / 2) * scale;
        ctx.drawImage(currentImg, x, y, currentImg.width * scale, currentImg.height * scale);

        // Conversión a Blanco y Negro puro (Procesamiento umbral de alta fidelidad)
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            let brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
            let color = brightness > 128 ? 255 : 0; // Umbral exacto al 50%
            data[i] = color;
            data[i+1] = color;
            data[i+2] = color;
        }
        ctx.putImageData(imgData, 0, 0);
        logger('Imagen rasterizada y binarizada correctamente.');
    }

    function checkReadyToPrint() {
        if (currentImg && characteristicBLE) {
            btnPrint.disabled = false;
        } else {
            btnPrint.disabled = true;
        }
    }

    // Web Bluetooth GATT Link
    btnConnect.addEventListener('click', async () => {
        if (!navigator.bluetooth) {
            logger('Error: Web Bluetooth no está soportado en este navegador.');
            alert('Por favor, usa Google Chrome o Microsoft Edge en un entorno seguro (HTTPS o localhost).');
            return;
        }

        try {
            logger('Abriendo buscador de dispositivos Bluetooth...');
            deviceBLE = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '0000ffe0-0000-1000-8000-00805f9b34fb', // Puertos serie BLE genéricos estándar
                    '0000ff00-0000-1000-8000-00805f9b34fb'  
                ]
            });

            logger(`Conectando al nodo: ${deviceBLE.name}`);
            const server = await deviceBLE.gatt.connect();
            
            logger('Explorando servicios primarios de impresión...');
            const services = await server.getPrimaryServices();
            
            if(services.length === 0) {
                throw new Error('El dispositivo no expone servicios primarios válidos.');
            }

            // Mapear de manera dinámica el descriptor de escritura
            for(let service of services) {
                let characteristics = await service.getCharacteristics();
                for(let char of characteristics) {
                    if(char.properties.write || char.properties.writeWithoutResponse) {
                        characteristicBLE = char;
                        break;
                    }
                }
                if(characteristicBLE) break;
            }

            if (!characteristicBLE) {
                throw new Error('No se encontró una característica con permisos de escritura (TX/RX).');
            }

            statusIndicator.classList.add('connected');
            statusText.innerHTML = `Conectado a ${deviceBLE.name}`;
            btnConnect.innerHTML = 'Conectado ✓';
            logger('Hardware sincronizado y listo.');
            checkReadyToPrint();

        } catch (error) {
            logger(`Fallo de conexión: ${error.message}`);
            console.error(error);
        }
    });

    // Procesamiento de Buffer y Transmisión de datos
    btnPrint.addEventListener('click', async () => {
        if (!characteristicBLE || !currentImg) return;

        const copies = parseInt(selectCopies.value);
        logger(`Iniciando cola de impresión: ${copies} copias activas.`);

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let bufferBytes = [];
        
        // Inicializar comando ESC/POS estándar de borrado e inicio [ESC @]
        bufferBytes.push(0x1B, 0x40);

        // Empaquetamiento de bits (1 bit por píxel: 1 = Blanco, 0 = Negro para el cabezal térmico)
        for (let y = 0; y < canvas.height; y++) {
            for (let x = 0; x < canvas.width; x += 8) {
                let byteValue = 0;
                for (let bit = 0; bit < 8; bit++) {
                    let pixelIndex = ((y * canvas.width) + (x + bit)) * 4;
                    if (pixelIndex < imgData.length && imgData[pixelIndex] === 0) {
                        byteValue |= (1 << (7 - bit)); 
                    }
                }
                bufferBytes.push(byteValue);
            }
        }

        // Comando de fin de página, avance de papel y guillotina/corte automático
        bufferBytes.push(0x1D, 0x56, 0x42, 0x00); 

        const dataToSend = new Uint8Array(bufferBytes);

        try {
            btnPrint.disabled = true;
            btnPrint.innerHTML = 'Transmitiendo...';

            for (let c = 1; c <= copies; c++) {
                logger(`Transmitiendo copia ${c}/${copies}...`);
                
                // MTU Packet Splitting (Fragmentación obligatoria Web Bluetooth a 20 bytes)
                const chunkSize = 20;
                for (let offset = 0; offset < dataToSend.length; offset += chunkSize) {
                    const chunk = dataToSend.slice(offset, offset + chunkSize);
                    await characteristicBLE.writeValueWithoutResponse(chunk);
                    // Delay técnico de protección para evitar desbordamientos de buffer en la impresora
                    await new Promise(resolve => setTimeout(resolve, 8));
                }
            }

            logger('¡Proceso de impresión terminado con éxito!');
        } catch (error) {
            logger(`Error crítico en transferencia: ${error.message}`);
        } finally {
            btnPrint.disabled = false;
            btnPrint.innerHTML = 'Enviar a Impresora';
        }
    });
</script>

</body>
</html>
