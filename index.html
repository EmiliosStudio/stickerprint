<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StickerPrint - Emilio's Studio</title>
    <style>
        :root {
            --bg-color: #0c0d11;
            --panel-bg: #14161f;
            --accent: #00ffaa;
            --accent-hover: #00db92;
            --text: #ffffff;
            --text-muted: #7e8494;
            --border: #222533;
            --console-bg: #090a0e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .app-container {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 100%;
            max-width: 440px;
            height: 98vh;
            max-height: 680px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        header {
            text-align: center;
            padding-bottom: 2px;
        }

        header h1 {
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        header h1 span {
            color: var(--accent);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.25);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.78rem;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #ff4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .status-dot.connected {
            background-color: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            gap: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            background: #1a1d29;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 12px 10px;
            text-align: center;
            cursor: pointer;
            background: rgba(255,255,255,0.01);
            transition: border 0.2s, background 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 85px;
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(0, 255, 170, 0.02);
        }

        .upload-zone p {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        #file-input { display: none; }

        .preview-container {
            display: flex;
            flex-direction: column;
        }

        .sticker-frame {
            width: 100%;
            background: #ffffff;
            border-radius: 4px;
            overflow: hidden;
            padding: 4px;
            border: 1px solid #ffffff;
        }

        #canvas-preview {
            width: 100%;
            height: auto;
            display: block;
            image-rendering: pixelated;
        }

        /* Consola Terminal de Diagnóstico */
        .terminal-box {
            background: var(--console-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px;
            height: 75px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.7rem;
            color: #8a90a6;
        }
        .terminal-box .log-entry { margin-bottom: 2px; }
        .terminal-box .log-success { color: var(--accent); }
        .terminal-box .log-error { color: #ff5555; }

        .btn {
            background: var(--accent);
            color: #0c0d11;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            width: 100%;
        }

        .btn:hover { background: var(--accent-hover); }
        .btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Sticker<span>Print</span></h1>
    </header>

    <div class="status-bar">
        <div>
            <span id="status-indicator" class="status-dot"></span>
            <span id="status-text">Impresora fuera de línea</span>
        </div>
    </div>

    <div class="grid-3">
        <div class="control-group">
            <label>Protocolo Driver</label>
            <select id="select-protocol">
                <option value="ilabel" selected>iLabel Nativo</option>
                <option value="escpos">ESC/POS Gráfico</option>
            </select>
        </div>
        <div class="control-group">
            <label>Medidas</label>
            <select id="select-size">
                <option value="50x15" selected>50x15 mm</option>
                <option value="50x10">50x10 mm</option>
            </select>
        </div>
        <div class="control-group">
            <label>Copias</label>
            <select id="select-copies"></select>
        </div>
    </div>

    <div class="upload-zone" id="drop-zone">
        <p><strong>Arrastra o haz clic aquí</strong></p>
        <p style="font-size: 0.7rem; color: var(--accent); margin-top: 2px;">Imagen para pegatina</p>
        <input type="file" id="file-input" accept="image/png, image/jpeg">
    </div>

    <div class="preview-container">
        <label>Previsualización Monocromo Binaria</label>
        <div class="sticker-frame">
            <canvas id="canvas-preview"></canvas>
        </div>
    </div>

    <div class="control-group">
        <label>Consola del Sistema de Impresión</label>
        <div class="terminal-box" id="terminal-log">
            <div class="log-entry">🤖 Sistema listo. Esperando conexión Bluetooth...</div>
        </div>
    </div>

    <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn btn-secondary" id="btn-connect">Enlazar BLE</button>
        <button class="btn" id="btn-print" disabled>Imprimir</button>
    </div>
</div>

<script>
    // Inyectar el bucle de copias
    const selectCopies = document.getElementById('select-copies');
    for (let i = 1; i <= 20; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${i} und`;
        if(i===1) opt.selected = true;
        selectCopies.appendChild(opt);
    }

    const selectSize = document.getElementById('select-size');
    const selectProtocol = document.getElementById('select-protocol');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('canvas-preview');
    const ctx = canvas.getContext('2d');
    const btnConnect = document.getElementById('btn-connect');
    const btnPrint = document.getElementById('btn-print');
    const statusIndicator = document.getElementById('status-indicator');
    const statusText = document.getElementById('status-text');
    const terminalLog = document.getElementById('terminal-log');

    let deviceBLE = null;
    let characteristicBLE = null;
    let writeModeWithoutResponse = true;
    let currentImg = null;

    function logger(msg, type = '') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type ? 'log-' + type : ''}`;
        entry.textContent = `> ${msg}`;
        terminalLog.appendChild(entry);
        terminalLog.scrollTop = terminalLog.scrollHeight;
    }

    function updateDimensions() {
        canvas.width = 384; // Resolución nativa horizontal fija
        canvas.height = (selectSize.value === '50x15') ? 114 : 76;
        renderSticker();
    }

    function renderSticker() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (!currentImg) return;

        let scale = Math.min(canvas.width / currentImg.width, canvas.height / currentImg.height);
        let w = currentImg.width * scale;
        let h = currentImg.height * scale;
        let x = (canvas.width / 2) - (w / 2);
        let y = (canvas.height / 2) - (h / 2);
        ctx.drawImage(currentImg, x, y, w, h);

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            let brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
            let color = brightness > 120 ? 255 : 0; // Umbral térmico directo
            data[i] = color; data[i+1] = color; data[i+2] = color;
        }
        ctx.putImageData(imgData, 0, 0);
    }

    selectSize.addEventListener('change', updateDimensions);
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
    dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = 'var(--border)'; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--border)';
        if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) processFile(e.target.files[0]);
    });

    function processFile(file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            currentImg = new Image();
            currentImg.onload = () => {
                updateDimensions();
                logger('Imagen procesada correctamente en búfer gráfica.', 'success');
                checkReady();
            };
            currentImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function checkReady() {
        if (currentImg && characteristicBLE) {
            btnPrint.disabled = false;
        } else {
            btnPrint.disabled = true;
        }
    }

    // ARQUITECTURA DE ENLACE BLUETOOTH FILTRADA ANTIBLOQUEOS (GATT FIXED)
    btnConnect.addEventListener('click', async () => {
        if (!navigator.bluetooth) {
            logger('Error: Web Bluetooth no soportado o entorno HTTP inseguro.', 'error');
            alert('Necesitas usar Google Chrome / Edge y protocolo HTTPS.');
            return;
        }
        try {
            logger('Abriendo cuadro de emparejamiento BLE...');
            deviceBLE = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '0000ff00-0000-1000-8000-00805f9b34fb', // iLabel / VSON Principal
                    '0000ffe0-0000-1000-8000-00805f9b34fb', // Puerto serie universal ESC/POS
                    '49535343-fe7d-4ae5-8fa9-9fafd205e455'  // Módulo alternativo ISSC
                ]
            });

            logger(`Conectando al servidor GATT de: ${deviceBLE.name}...`);
            const server = await deviceBLE.gatt.connect();
            
            logger('Explorando servicios primarios de impresión...');
            const services = await server.getPrimaryServices();
            
            characteristicBLE = null;

            // Listado de UUIDs conocidos de escritura para forzar prioridad y evitar canales basura del OS
            const knownDataUUIDs = [
                '0000ff02-0000-1000-8000-00805f9b34fb',
                '0000ffe1-0000-1000-8000-00805f9b34fb',
                '0000ff01-0000-1000-8000-00805f9b34fb'
            ];

            for (let service of services) {
                const sUuid = service.uuid.toLowerCase();
                // Saltarse descriptores del sistema operativo que lanzan el GATT Operation Failed
                if (sUuid.includes('1800') || sUuid.includes('1801') || sUuid.includes('180a')) continue;

                let chars = await service.getCharacteristics();
                
                // Intento 1: Buscar coincidencia de canal verificado
                for (let ch of chars) {
                    if (knownDataUUIDs.includes(ch.uuid.toLowerCase())) {
                        characteristicBLE = ch;
                        break;
                    }
                }
                
                // Intento 2: Fallback al primer canal genérico con permisos de escritura
                if (!characteristicBLE) {
                    for (let ch of chars) {
                        if (ch.properties.write || ch.properties.writeWithoutResponse) {
                            characteristicBLE = ch;
                            break;
                        }
                    }
                }
                if (characteristicBLE) break;
            }

            if (!characteristicBLE) throw new Error('Canal de datos de escritura inaccesible.');

            // Calibrar dinámicamente si el hardware requiere confirmación o ráfaga libre
            if (characteristicBLE.properties.write) {
                writeModeWithoutResponse = false; // El modo "With Response" es 100% estable contra caídas de buffer
                logger('Canal verificado: Modo Sincrónico (Con Respuesta).', 'success');
            } else {
                writeModeWithoutResponse = true;
                logger('Canal verificado: Modo Asincrónico (Ráfaga Directa).', 'success');
            }

            logger(`Conexión blindada con éxito a canal: [${characteristicBLE.uuid.substring(4,8).toUpperCase()}]`, 'success');
            statusIndicator.className = 'status-dot connected';
            statusText.innerHTML = `Línea activa: ${deviceBLE.name}`;
            btnConnect.innerHTML = 'Conectado ✓';
            checkReady();
        } catch (err) {
            logger(`Fallo de Enlace: ${err.message}`, 'error');
            statusText.innerHTML = "Impresora fuera de línea";
            alert(`Error de sincronización: ${err.message}`);
        }
    });

    // MOTOR EXECUTOR DE IMPRESIÓN CON CONMUTACIÓN DE PROTOCOLOS
    btnPrint.addEventListener('click', async () => {
        if (!characteristicBLE || !currentImg) return;
        const copies = parseInt(selectCopies.value);
        const protocol = selectProtocol.value;

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const widthBytes = canvas.width / 8; // 384 puntos / 8 = 48 bytes por fila
        const heightPixels = canvas.height;

        let payload = [];

        if (protocol === 'ilabel') {
            // PROTOCOLO 1: iLabel / VSON Estructurado Fila a Fila
            payload.push(0x1F, 0x11, 0x01, 0x00); // Inicializar cabezal iLabel
            for (let y = 0; y < heightPixels; y++) {
                payload.push(0x1F, 0x11, 0x04, widthBytes); // Comando de inyección lineal
                for (let x = 0; x < canvas.width; x += 8) {
                    let byteValue = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        let idx = ((y * canvas.width) + (x + bit)) * 4;
                        if (idx < imgData.length && imgData[idx] === 0) {
                            byteValue |= (1 << (7 - bit));
                        }
                    }
                    payload.push(byteValue);
                }
            }
            payload.push(0x1F, 0x11, 0x13, 0x00, 0x1F, 0x11, 0x14, 0x00); // Avanzar papel térmico y cerrar
        } else {
            // PROTOCOLO 2: ESC/POS Estándar Industrial (GS v 0)
            payload.push(0x1B, 0x40); // ESC @ (Reset)
            payload.push(0x1B, 0x33, 0x00); // Interlineado cero absoluto
            const yL = heightPixels & 0xFF;
            const yH = (heightPixels >> 8) & 0xFF;
            payload.push(0x1D, 0x76, 0x30, 0x00, widthBytes, 0x00, yL, yH); // Descriptor gráfico
            
            for (let y = 0; y < heightPixels; y++) {
                for (let x = 0; x < canvas.width; x += 8) {
                    let byteValue = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        let idx = ((y * canvas.width) + (x + bit)) * 4;
                        if (idx < imgData.length && imgData[idx] === 0) {
                            byteValue |= (1 << (7 - bit));
                        }
                    }
                    payload.push(byteValue);
                }
            }
            payload.push(0x1B, 0x64, 0x04); // Alimentar 4 líneas finales para salida limpia
        }

        const dataToSend = new Uint8Array(payload);

        try {
            btnPrint.disabled = true;
            btnPrint.innerHTML = 'Transmitiendo...';
            logger(`Transfiriendo datos usando Driver [${protocol.toUpperCase()}]...`);

            for (let c = 1; c <= copies; c++) {
                logger(`Enviando copia ${c} de ${copies}...`);
                const chunkSize = 20; // Fragmentación MTU homologada para Bluetooth LE
                
                for (let offset = 0; offset < dataToSend.length; offset += chunkSize) {
                    const chunk = dataToSend.slice(offset, offset + chunkSize);
                    
                    if (writeModeWithoutResponse) {
                        await characteristicBLE.writeValueWithoutResponse(chunk);
                        await new Promise(r => setTimeout(r, 12)); // Delay controlado anti-desbordamiento
                    } else {
                        await characteristicBLE.writeValueWithResponse(chunk);
                        await new Promise(r => setTimeout(r, 2)); // Latencia mínima asistida por hardware
                    }
                }
            }
            logger('¡Paquetes entregados! Trabajo completado.', 'success');
            alert('¡Impresión procesada con éxito!');
        } catch (err) {
            logger(`Error Crítico en envío: ${err.message}`, 'error');
            alert(`Error de comunicación física: ${err.message}`);
        } finally {
            btnPrint.disabled = false;
            btnPrint.innerHTML = 'Imprimir';
        }
    });

    updateDimensions();
</script>
</body>
</html>
